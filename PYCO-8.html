<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Galaxy Farm - Cutesy Nebula</title>
    <style>
        body { margin: 0; overflow: hidden; background: #05010a; touch-action: none; font-family: 'Segoe UI', sans-serif; user-select: none; -webkit-user-select: none; }
        
        /* UI OVERLAY */
        #start-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 500; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
        #start-btn { padding: 15px 40px; font-size: 24px; background: #ff4081; border: none; border-radius: 50px; color: white; font-weight: bold; cursor: pointer; box-shadow: 0 0 20px rgba(255, 64, 129, 0.6); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        #hud { position: absolute; top: 85px; left: 50%; transform: translateX(-50%); text-align: center; pointer-events: none; z-index: 100; color: white; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }
        #inventory { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.6); padding: 10px 15px; border-radius: 12px; color: white; border: 1px solid rgba(255,255,255,0.2); font-size: 14px; font-weight: bold; pointer-events: none; }
        #planet-name { font-size: 18px; font-weight: 900; letter-spacing: 1px; display: block; margin-bottom: 5px; background: rgba(0,0,0,0.6); padding: 5px 15px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.3); }
        
        /* ARCHED CELESTIAL HUD */
        #cycle-container { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); width: 240px; height: 60px; z-index: 101; pointer-events: none; }
        .hud-dot { position: absolute; background: rgba(255,255,255,0.4); border-radius: 50%; }
        #celestial-icon { position: absolute; font-size: 24px; transition: transform 0.1s linear; filter: drop-shadow(0 0 8px orange); margin-left: -12px; margin-top: -12px; }

        /* CONTROLS */
        .joystick-base { position: absolute; width: 80px; height: 80px; background: rgba(255,255,255,0.1); border-radius: 50%; display: none; border: 2px solid rgba(255,255,255,0.2); z-index: 51; pointer-events: none; }
        .joystick-knob { position: absolute; width: 32px; height: 32px; background: #fff; border-radius: 50%; left: 24px; top: 24px; opacity: 0.6; }
        
        #jump-btn { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); width: 90px; height: 90px; background: rgba(255, 255, 255, 0.15); border: 4px solid white; border-radius: 50%; color: white; font-weight: bold; display: flex; align-items: center; justify-content: center; z-index: 90; backdrop-filter: blur(4px); cursor: pointer; user-select: none; }

        #tool-toggle { position: absolute; top: 20px; right: 20px; width: 60px; height: 60px; background: #fff; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 28px; z-index: 110; box-shadow: 0 4px 10px rgba(0,0,0,0.3); border: 2px solid #ddd; cursor: pointer; }
        #tool-list { position: absolute; top: 90px; right: 25px; display: flex; flex-direction: column; gap: 12px; z-index: 109; transition: 0.3s; opacity: 0; transform: translateY(-20px); pointer-events: none; }
        #tool-list.open { opacity: 1; transform: translateY(0); pointer-events: auto; }
        .tool { width: 50px; height: 50px; border-radius: 50%; border: 2px solid white; display: flex; align-items: center; justify-content: center; font-size: 22px; background: rgba(0,0,0,0.8); color: white; cursor: pointer; }
        .tool.active { background: #fff; color: #000; transform: scale(1.1); }
        
        #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 8px; height: 8px; border: 2px solid rgba(255,255,255,0.8); border-radius: 50%; pointer-events: none; z-index: 100; display: none; }

        .baaa-bubble { position: absolute; background: black; color: white; padding: 4px 8px; border-radius: 10px; font-size: 12px; font-weight: bold; pointer-events: none; border: 2px solid white; transition: opacity 0.5s; z-index: 95; }
    </style>
</head>
<body>
    <div id="start-screen">
        <h1>Galaxy Farm</h1>
        <button id="start-btn" onclick="startGame()">TAP TO START</button>
        <p style="margin-top:15px; opacity: 0.7; font-size: 14px;">Sticks: Bottom Corners • Action: Top 75% Screen</p>
    </div>

    <div id="cycle-container"><div id="celestial-icon">☀️</div></div>
    <div id="inventory">🪓 Wood: 10<br>🪨 Stone: 5</div>
    <div id="hud"><span id="planet-name">HOME GREEN</span><div id="status">🚜 PLOW</div></div>
    <div id="crosshair"></div>
    <div id="jump-btn">JUMP</div>

    <div id="tool-toggle" onclick="toggleTools()">🎒</div>
    <div id="tool-list">
        <div class="tool active" id="tool-plow" onclick="selectTool('plow')">🚜</div>
        <div class="tool" id="tool-seed" onclick="selectTool('seed')">🌱</div>
        <div class="tool" id="tool-hammer" onclick="selectTool('hammer')">🔨</div>
        <div class="tool" id="tool-fence" onclick="selectTool('fence')">🚧</div>
    </div>

    <div id="joy-L-base" class="joystick-base"><div id="joy-L-knob" class="joystick-knob"></div></div>
    <div id="joy-R-base" class="joystick-base"><div id="joy-R-knob" class="joystick-knob"></div></div>
    
    <script type="importmap"> { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } } </script>
    <script type="module">
        import * as THREE from 'three';

        // --- AUDIO ---
        let audioCtx = null;
        let nextNoteTime = 0, noteIndex = 0;
        const melody = [261.63, 293.66, 329.63, 392.00, 440.00, 392.00];

        window.startGame = () => {
            document.getElementById('start-screen').style.display = 'none';
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            nextNoteTime = audioCtx.currentTime;
            scheduleAudio();
            if (!/Android|iPhone|iPad|iPod/i.test(navigator.userAgent)) {
                renderer.domElement.requestPointerLock();
            }
        };

        function scheduleAudio() {
            if (!audioCtx) return;
            while (nextNoteTime < audioCtx.currentTime + 0.1) {
                playNote(melody[noteIndex % melody.length], nextNoteTime);
                noteIndex++; nextNoteTime += 0.6;
            }
            requestAnimationFrame(scheduleAudio);
        }

        function playNote(freq, time) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine'; osc.frequency.value = freq;
            gain.gain.setValueAtTime(0, time);
            gain.gain.linearRampToValueAtTime(0.015, time + 0.05);
            gain.gain.exponentialRampToValueAtTime(0.001, time + 0.4);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(time); osc.stop(time + 0.5);
        }

        function playSFX(type) {
            if (!audioCtx) return;
            const t = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            if (type === 'jump') { osc.frequency.setValueAtTime(150, t); osc.frequency.linearRampToValueAtTime(300, t + 0.1); gain.gain.setValueAtTime(0.1, t); }
            else if (type === 'pop') { osc.frequency.setValueAtTime(400, t); osc.frequency.exponentialRampToValueAtTime(800, t + 0.1); gain.gain.setValueAtTime(0.1, t); }
            else if (type === 'thud') { osc.type = 'square'; osc.frequency.setValueAtTime(100, t); osc.frequency.exponentialRampToValueAtTime(50, t + 0.1); gain.gain.setValueAtTime(0.1, t); }
            else if (type === 'baaa') { osc.type = 'sawtooth'; osc.frequency.setValueAtTime(200, t); osc.frequency.linearRampToValueAtTime(150, t + 0.3); gain.gain.setValueAtTime(0.05, t); }
            gain.gain.linearRampToValueAtTime(0, t + 0.15);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(t); osc.stop(t + 0.3);
        }

        // --- SETUP ---
        let wood = 10, stone = 5, worldTime = 0;
        const interactDistance = 6; 
        window.activeTool = 'plow';
        const planets = [], activeAnims = [], interactables = [], creatures = [], weeds = [];
        let camPitch = 0.2, camZoom = 18, initialPinchDist = null;

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 5000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // --- CUTESY GALAXY GENERATOR ---
        function createCutesyNebula() {
            const canvas = document.createElement('canvas');
            canvas.width = 1024; canvas.height = 1024;
            const ctx = canvas.getContext('2d');
            
            // Background deep space
            ctx.fillStyle = '#0a0215';
            ctx.fillRect(0, 0, 1024, 1024);

            const colors = ['rgba(255, 100, 200, 0.15)', 'rgba(150, 100, 255, 0.15)', 'rgba(50, 200, 255, 0.1)'];
            for(let i = 0; i < 60; i++) {
                const x = Math.random() * 1024;
                const y = Math.random() * 1024;
                const r = Math.random() * 300 + 100;
                const grd = ctx.createRadialGradient(x, y, 0, x, y, r);
                grd.addColorStop(0, colors[Math.floor(Math.random() * colors.length)]);
                grd.addColorStop(1, 'transparent');
                ctx.fillStyle = grd;
                ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
            }
            return new THREE.CanvasTexture(canvas);
        }

        const nebGeo = new THREE.SphereGeometry(3000, 32, 32);
        const nebMat = new THREE.MeshBasicMaterial({ map: createCutesyNebula(), side: THREE.BackSide });
        scene.add(new THREE.Mesh(nebGeo, nebMat));

        const celestialSun = new THREE.Mesh(new THREE.SphereGeometry(60, 16, 16), new THREE.MeshBasicMaterial({ color: 0xffdd88 }));
        const celestialMoon = new THREE.Mesh(new THREE.SphereGeometry(40, 16, 16), new THREE.MeshBasicMaterial({ color: 0xccccff }));
        scene.add(celestialSun, celestialMoon);

        const stars = new THREE.Points(new THREE.BufferGeometry(), new THREE.PointsMaterial({color: 0xffffff, size: 2, transparent: true}));
        const starPts = [];
        for(let i=0; i<8000; i++) {
            const v = new THREE.Vector3(Math.random()-0.5, Math.random()-0.5, Math.random()-0.5).normalize().multiplyScalar(1800 + Math.random()*1000);
            starPts.push(v.x, v.y, v.z);
        }
        stars.geometry.setAttribute('position', new THREE.Float32BufferAttribute(starPts, 3));
        scene.add(stars);

        const sunLight = new THREE.DirectionalLight(0xfff5ee, 1.3); sunLight.castShadow = true;
        const ambLight = new THREE.AmbientLight(0x404060, 0.4);
        scene.add(sunLight, ambLight);

        function addOutline(mesh, thickness = 0.1) {
            const outline = new THREE.Mesh(mesh.geometry, new THREE.MeshBasicMaterial({ color: 0x000000, side: THREE.BackSide }));
            outline.scale.multiplyScalar(1 + thickness);
            mesh.add(outline);
            return outline;
        }

        // --- PLANETS & PROPS ---
        function createPlanet(x, y, z, radius, color, name, deco) {
            const p = new THREE.Mesh(new THREE.IcosahedronGeometry(radius, 6), new THREE.MeshToonMaterial({ color }));
            p.position.set(x, y, z); p.userData = { radius, name, type: 'planet' };
            p.receiveShadow = true; scene.add(p); planets.push(p); addOutline(p, 0.02);

            for(let i=0; i<deco; i++) {
                const normal = new THREE.Vector3(Math.random()-0.5, Math.random()-0.5, Math.random()-0.5).normalize();
                const pos = normal.clone().multiplyScalar(radius).add(p.position);
                const isTree = Math.random() > 0.4;
                const mesh = isTree ? 
                    new THREE.Mesh(new THREE.ConeGeometry(radius*0.07, radius*0.25, 6), new THREE.MeshToonMaterial({color: 0x2e7d32})) :
                    new THREE.Mesh(new THREE.DodecahedronGeometry(radius*0.06), new THREE.MeshToonMaterial({color: 0x757575}));
                mesh.position.copy(pos);
                mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), normal);
                mesh.userData = { type: 'prop', resource: isTree ? 'wood' : 'stone' };
                mesh.castShadow = true; scene.add(mesh); addOutline(mesh, 0.1); interactables.push(mesh);
            }
            for(let i=0; i<8; i++) spawnWeed(p);
            
            for(let i=0; i<3; i++) {
                const sheep = new THREE.Group();
                const body = new THREE.Mesh(new THREE.SphereGeometry(0.7, 10, 10), new THREE.MeshToonMaterial({color: 0xffffff}));
                sheep.add(body); addOutline(body, 0.1);
                const eye = new THREE.Mesh(new THREE.SphereGeometry(0.12, 4, 4), new THREE.MeshBasicMaterial({color: 0x000000}));
                const e1 = eye.clone(); e1.position.set(0.3, 0.2, 0.6);
                const e2 = eye.clone(); e2.position.set(-0.3, 0.2, 0.6);
                sheep.add(e1, e2);
                sheep.userData = { planet: p, offset: new THREE.Vector3(Math.random()-0.5, Math.random()-0.5, Math.random()-0.5).normalize(), jumpTime: Math.random()*10, e1, e2 };
                scene.add(sheep); creatures.push(sheep);
            }
            return p;
        }

        function spawnWeed(planet) {
            const normal = new THREE.Vector3(Math.random()-0.5, Math.random()-0.5, Math.random()-0.5).normalize();
            const pos = normal.clone().multiplyScalar(planet.userData.radius).add(planet.position);
            const weed = new THREE.Mesh(new THREE.SphereGeometry(0.35, 8, 4), new THREE.MeshToonMaterial({color: 0xb2ff59}));
            weed.position.copy(pos); weed.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), normal);
            weed.userData = { type: 'weed', planet: planet, phase: Math.random() * 10 };
            scene.add(weed); interactables.push(weed); weeds.push(weed); addOutline(weed, 0.2);
        }

        const p1 = createPlanet(0, 0, 0, 15, 0x66cc66, "HOME GREEN", 18);
        const p2 = createPlanet(100, 40, -100, 10, 0xcc6666, "RED WASTES", 8);
        const p3 = createPlanet(-60, 60, -70, 16, 0x6666cc, "BLUE CRAGS", 12);
        let currentPlanet = p1;

        const player = new THREE.Group();
        const pBody = new THREE.Mesh(new THREE.CapsuleGeometry(0.4, 0.7, 4, 8), new THREE.MeshToonMaterial({ color: 0xffaacc }));
        pBody.position.y = 0.8; pBody.castShadow = true; player.add(pBody); scene.add(player); player.position.set(0, 20, 0);
        addOutline(pBody, 0.1);

        let velocity = new THREE.Vector3(), isGrounded = false, targetPlanet = null;
        const jumpLine = new THREE.Line(new THREE.BufferGeometry(), new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.5 }));
        scene.add(jumpLine);

        function updateInventory() { document.getElementById('inventory').innerHTML = `🪓 Wood: ${wood}<br>🪨 Stone: ${stone}`; }
        
        // --- HUD ARCH ---
        const cycleCont = document.getElementById('cycle-container');
        for(let i=0; i<=4; i++) {
            const dot = document.createElement('div');
            dot.className = 'hud-dot';
            const size = (i===0||i===4) ? 6 : (i===2 ? 10 : 3);
            dot.style.width = size+'px'; dot.style.height = size+'px';
            const angle = (i/4) * Math.PI;
            dot.style.left = (120 - Math.cos(angle) * 100 - size/2) + 'px';
            dot.style.top = (50 - Math.sin(angle) * 40 - size/2) + 'px';
            cycleCont.appendChild(dot);
        }

        // --- CONTROLS ---
        const controls = { L: {active:false, id:-1, origin:{x:0,y:0}, curr:{x:0,y:0}}, R: {active:false, id:-1, origin:{x:0,y:0}, curr:{x:0,y:0}}, keys: {} };
        window.toggleTools = () => { document.getElementById('tool-list').classList.toggle('open'); };
        window.selectTool = (t) => {
            window.activeTool = t; document.querySelectorAll('.tool').forEach(el => el.classList.remove('active'));
            document.getElementById(`tool-${t}`).classList.add('active');
            document.getElementById('status').innerText = t.toUpperCase();
            document.getElementById('tool-list').classList.remove('open');
        };

        window.addEventListener('keydown', (e) => controls.keys[e.code] = true);
        window.addEventListener('keyup', (e) => controls.keys[e.code] = false);
        window.addEventListener('wheel', (e) => camZoom = Math.max(8, Math.min(45, camZoom + e.deltaY * 0.02)));

        renderer.domElement.addEventListener('mousedown', (e) => {
            if (document.pointerLockElement !== renderer.domElement && !/Android|iPhone/i.test(navigator.userAgent)) {
                renderer.domElement.requestPointerLock();
            } else { handleInteraction(e.clientX, e.clientY); }
        });

        document.addEventListener('pointerlockchange', () => document.getElementById('crosshair').style.display = document.pointerLockElement ? 'block' : 'none');
        window.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement === renderer.domElement) {
                player.rotateY(-e.movementX * 0.003);
                camPitch = Math.max(-0.6, Math.min(0.8, camPitch - e.movementY * 0.003));
            }
        });

        window.addEventListener('touchstart', (e) => {
            if (e.touches.length === 2) initialPinchDist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
            for(let t of e.changedTouches) {
                if (t.target.closest('#tool-toggle') || t.target.closest('.tool') || t.target.id === 'jump-btn' || t.target.id === 'start-btn') {
                    if(t.target.id === 'jump-btn') handleJump(); continue;
                }
                const x = t.clientX, y = t.clientY;
                if (y > window.innerHeight * 0.75) {
                    if (x < window.innerWidth * 0.35) {
                        controls.L.active = true; controls.L.id = t.identifier; controls.L.origin = {x, y}; controls.L.curr = {x, y};
                        const base = document.getElementById('joy-L-base');
                        base.style.display = 'block'; base.style.left = `${x-40}px`; base.style.top = `${y-40}px`;
                    } else if (x > window.innerWidth * 0.65) {
                        controls.R.active = true; controls.R.id = t.identifier; controls.R.origin = {x, y}; controls.R.curr = {x, y};
                        const base = document.getElementById('joy-R-base');
                        base.style.display = 'block'; base.style.left = `${x-40}px`; base.style.top = `${y-40}px`;
                    }
                } else { handleInteraction(x, y); }
            }
        }, {passive: false});

        window.addEventListener('touchmove', (e) => {
            if (e.touches.length === 2 && initialPinchDist) {
                const dist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
                camZoom = Math.max(8, Math.min(45, camZoom + (initialPinchDist - dist) * 0.05));
                initialPinchDist = dist;
            }
            for(let t of e.changedTouches) {
                if (controls.L.active && t.identifier === controls.L.id) {
                    controls.L.curr = {x: t.clientX, y: t.clientY};
                    const dx = t.clientX - controls.L.origin.x, dy = t.clientY - controls.L.origin.y;
                    const d = Math.min(Math.hypot(dx, dy), 40); const ang = Math.atan2(dy, dx);
                    document.getElementById('joy-L-knob').style.transform = `translate(${Math.cos(ang)*d}px, ${Math.sin(ang)*d}px)`;
                }
                if (controls.R.active && t.identifier === controls.R.id) {
                    const dx = t.clientX - controls.R.curr.x, dy = t.clientY - controls.R.curr.y;
                    player.rotateY(-dx * 0.008); camPitch = Math.max(-0.6, Math.min(0.8, camPitch - dy * 0.008));
                    controls.R.curr = {x: t.clientX, y: t.clientY};
                    const bx = t.clientX - controls.R.origin.x, by = t.clientY - controls.R.origin.y;
                    const bd = Math.min(Math.hypot(bx, by), 40); const ba = Math.atan2(by, bx);
                    document.getElementById('joy-R-knob').style.transform = `translate(${Math.cos(ba)*bd}px, ${Math.sin(ba)*bd}px)`;
                }
            }
        }, {passive: false});

        window.addEventListener('touchend', (e) => {
            for(let t of e.changedTouches) {
                if (controls.L.active && t.identifier === controls.L.id) { controls.L.active = false; document.getElementById('joy-L-base').style.display = 'none'; }
                if (controls.R.active && t.identifier === controls.R.id) { controls.R.active = false; document.getElementById('joy-R-base').style.display = 'none'; }
            }
            if (e.touches.length < 2) initialPinchDist = null;
        });

        // --- INTERACTION ---
        function handleInteraction(x, y) {
            const mouse = new THREE.Vector2();
            if (document.pointerLockElement) { mouse.set(0, 0); }
            else { mouse.set((x/window.innerWidth)*2-1, -(y/window.innerHeight)*2+1); }

            const ray = new THREE.Raycaster(); ray.setFromCamera(mouse, camera);
            const iHits = ray.intersectObjects(interactables, true);
            const pHits = ray.intersectObject(currentPlanet);
            
            const hit = iHits[0];
            if (hit && hit.point.distanceTo(player.position) < interactDistance) {
                const obj = hit.object;
                const type = obj.userData.type || obj.parent?.userData?.type;
                if (window.activeTool === 'hammer') {
                    const target = (type === 'fence') ? (obj.parent || obj) : obj;
                    if (type === 'prop') obj.userData.resource === 'wood' ? wood++ : stone++;
                    if (type === 'fence') wood++;
                    activeAnims.push({ obj: target, time: 0, type: 'destroy' });
                    interactables.splice(interactables.indexOf(target), 1); playSFX('pop'); updateInventory();
                } else if (window.activeTool === 'fence' && type === 'fence') {
                    (obj.parent || obj).rotateY(Math.PI/4); playSFX('thud');
                } else if (window.activeTool === 'seed' && type === 'mound') {
                    const s = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 0.5), new THREE.MeshToonMaterial({color: 0x76ff03}));
                    s.position.copy(obj.position); s.quaternion.copy(obj.quaternion); s.translateY(0.4);
                    s.scale.set(0,0,0); scene.add(s); addOutline(s, 0.2);
                    s.userData = { type: 'seed' }; interactables.push(s);
                    activeAnims.push({ obj: s, time: 0, targetY: 1, targetXZ: 1, type: 'pop' }); playSFX('pop');
                }
            } else if (pHits[0] && pHits[0].point.distanceTo(player.position) < interactDistance) {
                const p = pHits[0].object;
                const norm = pHits[0].face.normal.clone().transformDirection(p.matrixWorld).normalize();
                const pos = norm.clone().multiplyScalar(p.userData.radius).add(p.position);
                let overlap = false;
                for(let i of interactables) { if(i.position.distanceTo(pos) < (window.activeTool === 'fence' ? 0.5 : 0.85)) overlap = true; }
                if (!overlap) {
                    if (window.activeTool === 'plow') {
                        const mound = new THREE.Mesh(new THREE.SphereGeometry(0.8, 16, 8), new THREE.MeshToonMaterial({ color: 0x8d6e63 }));
                        mound.position.copy(pos).add(norm.clone().multiplyScalar(0.05));
                        mound.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), norm);
                        mound.userData = { type: 'mound', planet: p };
                        mound.scale.set(0,0,0); scene.add(mound); interactables.push(mound); addOutline(mound, 0.05);
                        activeAnims.push({ obj: mound, time: 0, targetY: 0.2, targetXZ: 1.0, type: 'pop' }); playSFX('pop');
                    } else if (window.activeTool === 'fence' && wood > 0) {
                        wood--; updateInventory();
                        const fence = new THREE.Group();
                        const post = new THREE.Mesh(new THREE.BoxGeometry(0.25, 1, 0.25), new THREE.MeshToonMaterial({color: 0x5d4037}));
                        const rail = new THREE.Mesh(new THREE.BoxGeometry(1.4, 0.25, 0.1), new THREE.MeshToonMaterial({color: 0x795548}));
                        const p1 = post.clone(); p1.position.x = -0.6; const p2 = post.clone(); p2.position.x = 0.6; rail.position.y = 0.3;
                        fence.add(p1, p2, rail); fence.position.copy(pos);
                        const q = new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0,1,0), norm);
                        const look = player.position.clone().sub(pos).projectOnPlane(norm).normalize();
                        const m = new THREE.Matrix4().lookAt(pos, pos.clone().add(look), norm); q.setFromRotationMatrix(m);
                        fence.quaternion.copy(q); fence.userData = { type: 'fence', planet: p };
                        fence.scale.set(0,0,0); scene.add(fence); interactables.push(fence);
                        activeAnims.push({ obj: fence, time: 0, targetY: 1, targetXZ: 1, type: 'pop' }); playSFX('thud');
                    }
                }
            }
        }

        function handleJump() {
            if (!isGrounded) return;
            const up = player.position.clone().sub(currentPlanet.position).normalize();
            if (targetPlanet) velocity.copy(targetPlanet.position.clone().sub(player.position).normalize().multiplyScalar(player.position.distanceTo(targetPlanet.position) * 0.052)).addScaledVector(up, 0.3);
            else velocity.copy(up).multiplyScalar(0.7);
            isGrounded = false; playSFX('jump');
        }

        function showBaaaBubble(pos) {
            const bubble = document.createElement('div');
            bubble.className = 'baaa-bubble'; bubble.innerText = 'Baaa!';
            document.body.appendChild(bubble);
            const vector = pos.clone().project(camera);
            bubble.style.left = `${(vector.x + 1) / 2 * window.innerWidth}px`;
            bubble.style.top = `${(-vector.y + 1) / 2 * window.innerHeight - 30}px`;
            setTimeout(() => { bubble.style.opacity = 0; setTimeout(() => bubble.remove(), 500); }, 1000);
        }

        function animate() {
            requestAnimationFrame(animate);
            worldTime += 0.0004; 
            const cyclePos = worldTime % (Math.PI * 2);
            
            const icon = document.getElementById('celestial-icon');
            const hudAngle = (cyclePos % Math.PI);
            icon.style.left = (120 - Math.cos(hudAngle) * 100) + 'px';
            icon.style.top = (50 - Math.sin(hudAngle) * 40) + 'px';
            const cosVal = Math.cos(cyclePos);
            const isDay = cosVal > -0.2;
            icon.innerText = isDay ? '☀️' : '🌙';
            icon.style.filter = isDay ? 'drop-shadow(0 0 8px orange)' : 'drop-shadow(0 0 8px #fff)';

            const dayFactor = isDay ? Math.max(0, Math.sin(cyclePos)) : 0;
            sunLight.position.set(Math.cos(cyclePos)*1000, Math.sin(cyclePos)*1000, 0);
            sunLight.intensity = Math.max(0.1, dayFactor + 0.6);
            ambLight.intensity = Math.max(0.2, (dayFactor + 1) * 0.3);
            stars.material.opacity = Math.max(0.3, 1 - sunLight.intensity);

            celestialSun.position.set(Math.cos(cyclePos)*1200, Math.sin(cyclePos)*1200, 0);
            celestialMoon.position.set(Math.cos(cyclePos + Math.PI)*1200, Math.sin(cyclePos + Math.PI)*1200, 0);

            activeAnims.forEach((a, i) => {
                a.time += 0.08;
                if (a.type === 'pop') {
                    const b = Math.sin(Math.min(a.time * 5, Math.PI));
                    a.obj.scale.set(a.targetXZ * b, a.targetY * b, a.targetXZ * b);
                    if(a.time > 0.8) { a.obj.scale.set(a.targetXZ, a.targetY, a.targetXZ); activeAnims.splice(i, 1); }
                } else if (a.type === 'destroy') {
                    const s = Math.max(0, 1 - a.time); a.obj.scale.set(s,s,s);
                    if(s <= 0) { scene.remove(a.obj); activeAnims.splice(i,1); }
                }
            });

            creatures.forEach(s => {
                s.userData.jumpTime += 0.05; 
                const hop = Math.sin(s.userData.jumpTime * 3); const hopHeight = Math.max(0, hop) * 0.6;
                s.position.lerp(s.userData.offset.clone().multiplyScalar(s.userData.planet.userData.radius + 0.6 + hopHeight).add(s.userData.planet.position), 0.2);
                s.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), s.userData.offset);
                const stretch = 1 + Math.max(0, hop) * 0.3; const squish = 1 - Math.max(0, hop) * 0.15;
                s.scale.set(squish, stretch, squish);
                if(Math.random() > 0.998) { playSFX('baaa'); showBaaaBubble(s.position); }
            });

            weeds.forEach(w => { w.userData.phase += 0.05; const s = 1 + Math.sin(w.userData.phase) * 0.1; w.scale.set(s,s,s); });

            let closest = currentPlanet, dMin = Infinity;
            planets.forEach(p => { const d = player.position.distanceTo(p.position); if(d < dMin) { dMin = d; closest = p; }});
            if (closest !== currentPlanet) { currentPlanet = closest; document.getElementById('planet-name').innerText = currentPlanet.userData.name; }

            const up = player.position.clone().sub(currentPlanet.position).normalize();
            if (player.position.distanceTo(currentPlanet.position) - currentPlanet.userData.radius <= 0.1 && velocity.dot(up) <= 0) {
                isGrounded = true; velocity.set(0,0,0); player.position.copy(up.clone().multiplyScalar(currentPlanet.userData.radius).add(currentPlanet.position));
            } else { isGrounded = false; velocity.addScaledVector(up, -0.015); }
            player.position.add(velocity);

            let mX = 0, mY = 0;
            if (controls.L.active) { 
                mX = Math.max(-1, Math.min(1, (controls.L.curr.x - controls.L.origin.x)/40)); mY = Math.max(-1, Math.min(1, (controls.L.curr.y - controls.L.origin.y)/40)); 
            } else {
                if (controls.keys['KeyA']) mX = -1; if(controls.keys['KeyD']) mX = 1; if(controls.keys['KeyW']) mY = -1; if(controls.keys['KeyS']) mY = 1; if(controls.keys['Space']) handleJump();
            }

            if (isGrounded) {
                player.position.addScaledVector(new THREE.Vector3(0,0,1).applyQuaternion(player.quaternion), -mY * 0.25).addScaledVector(new THREE.Vector3(1,0,0).applyQuaternion(player.quaternion), -mX * 0.25);
            }
            player.quaternion.premultiply(new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0,1,0).applyQuaternion(player.quaternion), up));
            const camPos = player.position.clone().add(up.clone().multiplyScalar(6 + (camPitch * 8))).add(new THREE.Vector3(0,0,-1).applyQuaternion(player.quaternion).multiplyScalar(camZoom));
            camera.position.lerp(camPos, 0.2); camera.lookAt(player.position.clone().add(up.clone().multiplyScalar(2))); camera.up.copy(up);
            
            targetPlanet = null; jumpLine.visible = false;
            const fwd = new THREE.Vector3(0,0,1).applyQuaternion(player.quaternion);
            planets.forEach(p => {
                if(p === currentPlanet) return;
                if(fwd.dot(p.position.clone().sub(player.position).normalize()) > 0.85) { 
                    targetPlanet = p; jumpLine.visible = true; 
                    const mid = player.position.clone().add(p.position).multiplyScalar(0.5).add(up.clone().multiplyScalar(10));
                    const curve = new THREE.QuadraticBezierCurve3(player.position, mid, p.position);
                    jumpLine.geometry.setFromPoints(curve.getPoints(20));
                }
            });
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
